<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1" name="viewport"/>
<title>Aviabrand.uz — скоро онлайн-продажа</title>
<meta content="noindex" name="robots"/>
<link href="assets/style.css" rel="stylesheet"/>
</head>
<body>
<div class="container">
<header class="nav">
<div class="brand">
<span>✈️</span>
<span>aviabrand.uz</span>
<span class="badge">coming soon</span>
</div>
<div class="lang">
<button data-lang="ru" data-set-lang="ru" type="button">RU</button>
<button data-lang="uz" data-set-lang="uz" type="button">UZ</button>
</div>
</header>
<main class="card" style="margin-top:18px">
<div class="p">
<h1 class="h1" data-i18n="coming_title" style="font-size:34px">
          Скоро начнём онлайн-продажу
        </h1>
<p class="lead" data-i18n="coming_sub">
          Мы уже получили вашу заявку. Ниже — параметры поиска, которые вы ввели.
        </p>
<div class="section card" id="searchSummary">
<div class="p">
<div class="grid3">
<div class="item">
<b data-i18n="field_from">Откуда</b>
<div class="small" id="sumFrom">-</div>
</div>
<div class="item">
<b data-i18n="field_to">Куда</b>
<div class="small" id="sumTo">-</div>
</div>
<div class="item">
<b data-i18n="field_pax">Пассажиры</b>
<div class="small" id="sumPax">-</div>
</div>
</div>
<div class="item" style="margin-top:10px">
<b data-i18n="field_dates">Даты</b>
<div class="small" id="sumDates">-</div>
</div>
</div>
</div>
<a class="btn secondary" data-i18n="coming_btn" href="index.html" style="margin-top:12px;display:inline-flex">
          Вернуться на главную
        </a>
</div>
</main>
<footer class="footer">
<div class="small" data-i18n="footer_note">
        Если хотите — добавим форму заявки (email/телефон) на этой странице.
      </div>
</footer>
</div>
<script src="site.config.js"></script>
<script defer="" src="assets/script.js"></script>
</body>
</html>
